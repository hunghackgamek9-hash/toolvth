name: Daily Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Key
        run: |
          python3 -c "
import random,string
key='VB-'+''.join(random.choices(string.ascii_uppercase+string.digits,k=10))
open('key.txt','w').write(key)
print(key)
"

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add key.txt
          git commit -m 'update key' || true
          git push
